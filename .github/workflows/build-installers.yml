name: Kurulum dosyaları (Windows .exe + Android .apk)

# Bilgisayar GEREKTİRMEZ — telefondan çalıştırılabilir.
#
# Çalıştırma:
#   GitHub → Actions sekmesi → "Kurulum dosyaları" → Run workflow
#   (ya da v1.0.0 gibi bir sürüm etiketi push edince otomatik çalışır)
#
# Bitince:
#   - Her işin altındaki "Artifacts" bölümünden windows-exe ve android-apk indirilir.
#   - Etiketle tetiklendiyse ayrıca bir GitHub Release oluşturulup iki dosya eklenir.
#
# Not: APK debug (imzasız) üretilir — telefona "bilinmeyen kaynak" izniyle
# kurulur, iç kullanım için yeterlidir. .exe imzasız olduğundan Windows
# SmartScreen "yine de çalıştır" uyarısı verebilir (normaldir).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # sürüm (release) oluşturmak için

jobs:
  windows:
    name: Windows masaüstü (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıklar
        run: npm ci

      - name: Web build
        run: npm run build

      - name: Installer üret (NSIS)
        run: npx electron-builder --win nsis --publish never

      - name: Artifact yükle (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe
          if-no-files-found: error

  android:
    name: Android mobil (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Bağımlılıklar
        run: npm ci

      - name: Web build
        run: npm run build

      - name: Capacitor android projesi
        run: |
          npx cap add android
          npx cap sync android

      - name: APK derle (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Sabit ada kopyala
        run: cp android/app/build/outputs/apk/debug/app-debug.apk basak-vardiya.apk

      - name: Artifact yükle (.apk)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: basak-vardiya.apk
          if-no-files-found: error

  release:
    name: Sürüm oluştur (etiketle tetiklenince)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - name: Artifact'leri indir
        uses: actions/download-artifact@v4
        with:
          path: indir

      - name: Release oluştur + dosyaları ekle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            indir/windows-exe/*.exe \
            indir/android-apk/*.apk \
            --repo "${{ github.repository }}" \
            --title "Başak Vardiya ${{ github.ref_name }}" \
            --generate-notes
